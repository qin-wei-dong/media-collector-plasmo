name: "Submit to Web Store"
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"
      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build the extension
        run: pnpm build
      - name: Package the extension into a zip artifact
        run: pnpm package
      - name: Check publish keys
        env:
          BPP_KEYS: ${{ secrets.BPP_KEYS }}
          SUBMIT_KEYS: ${{ secrets.SUBMIT_KEYS }}
        run: |
          if [ -z "$BPP_KEYS" ] && [ -z "$SUBMIT_KEYS" ]; then
            echo "::error::Missing GitHub secret. Set BPP_KEYS in repository secrets (SUBMIT_KEYS is accepted as a legacy alias)."
            exit 1
          fi
      - name: Browser Platform Publish
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ secrets.BPP_KEYS || secrets.SUBMIT_KEYS }}
          artifact: build/chrome-mv3-prod.zip
