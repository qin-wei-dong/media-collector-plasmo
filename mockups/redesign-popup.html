<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材采集助手 — 弹窗重设计</title>
<style>
  :root {
    --bg: #0a0a0c;
    --bg2: #1c1c1e;
    --card: rgba(255,255,255,0.06);
    --card-hover: rgba(255,255,255,0.10);
    --line: rgba(255,255,255,0.08);
    --line-soft: rgba(255,255,255,0.05);
    --t1: #ffffff;
    --t2: rgba(255,255,255,0.7);
    --t3: rgba(255,255,255,0.45);
    --accent: #0a84ff;
    --accent-soft: rgba(10,132,255,0.16);
    --xhs: #FF2442;
    --xhs-bg: rgba(255,36,66,0.16);
    --douyin: #25F4EE;
    --douyin-bg: rgba(37,244,238,0.14);
    --danger: #FF453A;
    --danger-bg: rgba(255,69,58,0.16);
    --r-sm: 8px; --r-md: 11px; --r-lg: 16px; --pill: 999px;
    --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: #2a2a2e;
    display: flex; gap: 40px; flex-wrap: wrap;
    padding: 48px; min-height: 100vh;
    align-items: flex-start; justify-content: center;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .stage-label { color: rgba(255,255,255,0.55); font-size: 13px; font-family: var(--font); letter-spacing: 0.3px; }

  /* ============ POPUP SHELL ============ */
  .popup {
    width: 460px; height: 660px;
    background:
      radial-gradient(ellipse 70% 45% at 30% 0%, rgba(255,90,95,0.18), transparent 60%),
      radial-gradient(ellipse 65% 55% at 85% 22%, rgba(120,80,255,0.15), transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    border-radius: 20px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    color: var(--t1);
    position: relative;
  }

  /* ---- top bar ---- */
  .nav { padding: 18px 18px 10px; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .logo { width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, #5AC8FA, #0a84ff);
    display: grid; place-items: center; box-shadow: 0 4px 12px rgba(10,132,255,0.4); }
  .logo svg { width: 15px; height: 15px; }
  .title { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; }
  .count-pill { font-size: 12px; font-weight: 600; color: var(--t2);
    background: var(--card); padding: 3px 9px; border-radius: var(--pill); }
  .nav-tools { display: flex; gap: 6px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 9px; border: none;
    background: var(--card); color: var(--t2); cursor: pointer;
    display: grid; place-items: center; transition: all 0.18s var(--ease); }
  .icon-btn:hover { background: var(--card-hover); color: var(--t1); }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.primary { background: var(--accent-soft); color: #4da3ff; }

  /* ---- stats strip ---- */
  .stats { display: flex; gap: 8px; padding: 4px 18px 12px; }
  .stat { flex: 1; background: var(--card); border-radius: var(--r-md);
    padding: 10px 12px; }
  .stat-num { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.1; }
  .stat-num .unit { font-size: 12px; font-weight: 500; color: var(--t3); margin-left: 2px; }
  .stat-label { font-size: 11px; color: var(--t3); margin-top: 3px; }
  .stat-num.up { color: #30d158; }

  /* ---- filter row ---- */
  .filters { display: flex; align-items: center; gap: 7px; padding: 0 18px 12px; flex-wrap: wrap; }
  .chip { font-size: 13px; font-weight: 500; color: var(--t2);
    background: var(--card); border: none; padding: 6px 12px; border-radius: var(--pill);
    cursor: pointer; transition: all 0.16s var(--ease); white-space: nowrap; }
  .chip:hover { background: var(--card-hover); }
  .chip.active { color: #fff; background: var(--accent); }
  .chip.xhs.active { background: var(--xhs); }
  .chip.dy.active { background: var(--douyin); color: #062a29; }
  .seg { display: flex; background: var(--card); border-radius: var(--pill); padding: 2px; }
  .seg button { border: none; background: transparent; color: var(--t3); cursor: pointer;
    width: 30px; height: 26px; border-radius: var(--pill); display: grid; place-items: center;
    transition: all 0.16s var(--ease); }
  .seg button.on { background: rgba(255,255,255,0.16); color: #fff; }
  .seg button svg { width: 15px; height: 15px; }

  /* ---- grid ---- */
  .scroll { flex: 1; overflow-y: auto; padding: 0 18px 90px; }
  .scroll::-webkit-scrollbar { width: 0; }
  .section-h { font-size: 12px; font-weight: 600; color: var(--t3); letter-spacing: 0.4px;
    margin: 6px 2px 9px; display: flex; align-items: center; gap: 7px; }
  .section-h::after { content: ""; flex: 1; height: 1px; background: var(--line-soft); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
  .cell { position: relative; aspect-ratio: 1; border-radius: var(--r-md); overflow: hidden;
    background: var(--card); cursor: pointer; transition: transform 0.18s var(--ease); }
  .cell:hover { transform: translateY(-2px); }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell .badge { position: absolute; top: 5px; left: 5px; font-size: 10px; font-weight: 700;
    color: #fff; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    padding: 2px 6px; border-radius: var(--pill); display: flex; align-items: center; gap: 3px; }
  .cell .vbadge { position: absolute; bottom: 5px; right: 5px; width: 20px; height: 20px;
    border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
    display: grid; place-items: center; }
  .cell .vbadge svg { width: 11px; height: 11px; fill: #fff; }
  .cell .check { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.85); background: rgba(0,0,0,0.25); backdrop-filter: blur(4px);
    opacity: 0; transition: all 0.16s var(--ease); }
  .cell:hover .check { opacity: 1; }
  .cell.sel .check { opacity: 1; background: var(--accent); border-color: var(--accent); }
  .cell.sel { outline: 2.5px solid var(--accent); outline-offset: -2.5px; }
  .cell.sel .check::after { content: ""; position: absolute; left: 5px; top: 2px; width: 5px; height: 9px;
    border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .cell .meta { position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 7px 5px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7)); font-size: 10px; color: rgba(255,255,255,0.9);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0; transition: opacity 0.16s; }
  .cell:hover .meta { opacity: 1; }

  /* ---- float action bar ---- */
  .floatbar { position: absolute; left: 18px; right: 18px; bottom: 16px;
    background: rgba(40,40,42,0.7); backdrop-filter: saturate(180%) blur(30px);
    border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5); }
  .fb-info { font-size: 13px; color: var(--t2); flex: 1; }
  .fb-info b { color: #fff; font-weight: 700; }
  .fb-btn { border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.16s var(--ease);
    font-family: var(--font); }
  .fb-btn svg { width: 15px; height: 15px; }
  .fb-btn.ghost { background: var(--card); color: var(--t2); }
  .fb-btn.ghost:hover { background: var(--card-hover); color: #fff; }
  .fb-btn.go { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(10,132,255,0.4); }
  .fb-btn.danger { background: var(--danger-bg); color: var(--danger); width: 38px; padding: 8px; justify-content: center; }

  /* "open library" hint */
  .lib-link { display: flex; align-items: center; justify-content: center; gap: 7px;
    margin: 2px 18px 0; padding: 9px; border-radius: var(--r-md);
    font-size: 12px; color: var(--t3); cursor: pointer; transition: all 0.16s; }
  .lib-link:hover { color: var(--accent); background: var(--card); }
  .lib-link svg { width: 13px; height: 13px; }
</style>
</head>
<body>

<div class="stage">
  <div class="stage-label">弹窗 · 快速查看最近采集 (460×660)</div>
  <div class="popup">
    <!-- nav -->
    <div class="nav">
      <div class="brand">
        <div class="logo"><svg viewBox="0 0 22 22" fill="none"><rect x="3" y="9" width="13" height="10" rx="2.5" fill="#fff" opacity="0.55"/><rect x="6" y="3" width="13" height="10" rx="2.5" fill="#fff"/></svg></div>
        <span class="title">素材库</span>
        <span class="count-pill">128</span>
      </div>
      <div class="nav-tools">
        <button class="icon-btn" title="搜索"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></button>
        <button class="icon-btn" title="主题"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button class="icon-btn primary" title="打开素材库"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M21 3l-9 9"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></button>
      </div>
    </div>

    <!-- stats -->
    <div class="stats">
      <div class="stat"><div class="stat-num up">+12<span class="unit">今日</span></div><div class="stat-label">今日采集</div></div>
      <div class="stat"><div class="stat-num">128<span class="unit">项</span></div><div class="stat-label">素材总量</div></div>
      <div class="stat"><div class="stat-num">16<span class="unit">位</span></div><div class="stat-label">关注作者</div></div>
    </div>

    <!-- filters -->
    <div class="filters">
      <button class="chip active">全部</button>
      <button class="chip xhs">小红书</button>
      <button class="chip dy">抖音</button>
      <div style="flex:1"></div>
      <div class="seg">
        <button class="on" title="图片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></button>
        <button title="视频"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></button>
      </div>
    </div>

    <!-- grid -->
    <div class="scroll">
      <div class="section-h">今天 · 12</div>
      <div class="grid">
        <div class="cell sel"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=200&h=200&fit=crop"><span class="badge">9图</span><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=200&h=200&fit=crop"><div class="check"></div><div class="meta">@穿搭日记</div></div>
        <div class="cell sel"><img src="https://images.unsplash.com/photo-1445205170230-053b83016050?w=200&h=200&fit=crop"><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=200&h=200&fit=crop"><div class="vbadge"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=200&h=200&fit=crop"><span class="badge">6图</span><div class="check"></div></div>
        <div class="cell sel"><img src="https://images.unsplash.com/photo-1469827160215-9d29e96e72f4?w=200&h=200&fit=crop"><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=200&h=200&fit=crop"><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1492707892479-7bc8d5a4ee93?w=200&h=200&fit=crop"><div class="vbadge"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div class="check"></div></div>
      </div>
      <div class="section-h">昨天 · 24</div>
      <div class="grid">
        <div class="cell"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=200&h=200&fit=crop"><span class="badge">4图</span><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&h=200&fit=crop"><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=200&h=200&fit=crop"><div class="check"></div></div>
        <div class="cell"><img src="https://images.unsplash.com/photo-1488161628813-04466f872be2?w=200&h=200&fit=crop"><div class="check"></div></div>
      </div>
    </div>

    <!-- float bar -->
    <div class="floatbar">
      <div class="fb-info">已选 <b>3</b> 项</div>
      <button class="fb-btn ghost"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>全选</button>
      <button class="fb-btn go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出</button>
      <button class="fb-btn danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
    </div>
  </div>
</div>

</body>
</html>
