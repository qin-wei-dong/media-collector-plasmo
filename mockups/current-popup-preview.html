<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>素材库弹窗 — 当前实现预览(对齐原型后)</title>
<style>
  /* 与 lib/design-tokens.ts darkTheme 完全一致的 token */
  :root{
    --bg:#0a0a0c; --card:rgba(255,255,255,0.08); --cardHover:rgba(255,255,255,0.12);
    --floatBar:rgba(40,40,42,0.62);
    --t1:#fff; --t2:rgba(255,255,255,0.7); --t3:rgba(255,255,255,0.5);
    --accent:#0a84ff; --danger:#FF453A; --dangerBg:rgba(255,69,58,0.16);
    --xhs:#FF2442; --xhsBg:rgba(255,36,66,0.16); --douyin:#25F4EE; --douyinBg:rgba(37,244,238,0.16);
    --hairline:rgba(255,255,255,0.08);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
    --ease:cubic-bezier(0.16,1,0.3,1);
    /* ambient */
    --ambient:radial-gradient(ellipse 70% 45% at 30% 0%, rgba(255,90,95,0.22), transparent 60%),
              radial-gradient(ellipse 65% 55% at 85% 25%, rgba(120,80,255,0.18), transparent 55%),
              linear-gradient(180deg,#0a0a0c 0%,#1c1c1e 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#2a2a2e;display:grid;place-items:center;min-height:100vh;padding:40px;font-family:var(--font)}
  .root{width:460px;height:660px;border-radius:20px;overflow:hidden;position:relative;color:var(--t1);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .ambient{position:absolute;inset:0;z-index:0;background:var(--ambient)}
  .content{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}
  /* navbar */
  .navbar{flex-shrink:0;padding:14px 17px 10px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:22px;height:22px;filter:drop-shadow(0 2px 6px rgba(10,132,255,.35))}
  .largetitle{font-size:26px;font-weight:700;letter-spacing:-0.5px}
  .countBadge{font-size:11px;font-weight:600;color:var(--t2);background:var(--card);padding:2px 8px;border-radius:8px;margin-left:6px}
  .tools{display:flex;gap:6px}
  .tool{width:30px;height:30px;border-radius:999px;display:grid;place-items:center;cursor:pointer;color:var(--t2);background:var(--card)}
  .tool svg{width:15px;height:15px}
  /* stats */
  .statsRow{display:flex;gap:8px;padding:0 17px 12px}
  .stat{flex:1;min-width:0;background:var(--card);border-radius:11px;padding:12px 14px}
  .stat-v{font-size:19px;font-weight:700;letter-spacing:-0.3px;line-height:1.1}
  .stat-v .u{font-size:12px;font-weight:500;color:var(--t3);margin-left:2px}
  .stat-v.hl{color:var(--accent)}
  .stat-l{font-size:11px;color:var(--t3);margin-top:3px}
  .stat-h{font-size:11px;color:var(--t2);margin-top:2px}
  /* filter row */
  .filterRow{display:flex;align-items:center;gap:6px;margin:0 17px 8px;flex-wrap:wrap}
  .chip{border:1px solid transparent;background:var(--card);color:var(--t2);font-size:13px;font-weight:500;padding:5px 12px;border-radius:999px;cursor:pointer}
  .chip.on{background:var(--accent);color:#fff;font-weight:600;border-color:var(--accent)}
  .chip.xhs.on{background:var(--xhsBg);color:var(--xhs);border-color:rgba(255,36,66,.33)}
  .chip.dy.on{background:var(--douyinBg);color:var(--douyin);border-color:rgba(37,244,238,.33)}
  .divider{width:1px;height:16px;background:var(--hairline);margin:0 2px}
  .seg{display:inline-flex;background:var(--card);border-radius:999px;padding:2px;gap:2px}
  .segb{width:28px;height:22px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-radius:999px;display:inline-flex;align-items:center;justify-content:center}
  .segb.on{background:var(--accent);color:#fff}
  .segb svg{width:14px;height:14px}
  /* scroll + grid */
  .scroll{flex:1;overflow-y:auto;padding-bottom:76px}
  .scroll::-webkit-scrollbar{width:0}
  .gridSection{padding:0 17px 14px}
  .gridHead{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:8px}
  .gridTitle{font-size:17px;font-weight:700;letter-spacing:-0.3px}
  .gridCount{font-size:12px;color:var(--t3);font-weight:500}
  .gridWrap{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .card{width:100%;position:relative}
  .art{width:100%;aspect-ratio:1;border-radius:8px;position:relative;overflow:hidden;cursor:pointer;
    background:linear-gradient(135deg,#2a2a2e,#3a3a3e 50%,#2a2a2e);box-shadow:0 8px 20px rgba(0,0,0,.45);transition:transform .18s var(--ease)}
  .card:hover .art{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 28px rgba(0,0,0,.55)}
  .art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .selectBtn{position:absolute;top:7px;left:7px;width:22px;height:22px;border-radius:999px;border:1.5px solid rgba(255,255,255,.9);background:rgba(0,0,0,.3);display:grid;place-items:center;color:#fff}
  .selectBtn.on{background:var(--accent);border-color:#fff}
  .selectBtn svg{width:13px;height:13px}
  .vbadge{position:absolute;bottom:7px;right:7px;width:22px;height:22px;border-radius:999px;background:rgba(0,0,0,.6);display:grid;place-items:center;color:#fff}
  .vbadge svg{width:12px;height:12px;fill:#fff}
  .multi{position:absolute;top:7px;right:7px;font-size:11px;font-weight:700;background:rgba(0,0,0,.6);color:#fff;padding:2px 7px;border-radius:5px}
  .info{position:absolute;left:0;right:0;bottom:0;padding:16px 8px 6px;background:linear-gradient(transparent,rgba(0,0,0,.72));opacity:0;transition:opacity .18s var(--ease)}
  .card:hover .info{opacity:1}
  .info span{font-size:11px;font-weight:600;color:#fff;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* floatbar */
  .bar{position:absolute;bottom:12px;left:12px;right:12px;background:var(--floatBar);backdrop-filter:saturate(180%) blur(30px);
    border:.5px solid var(--hairline);border-radius:18px;padding:7px;display:flex;align-items:center;gap:4px;z-index:10;box-shadow:0 16px 40px rgba(0,0,0,.5)}
  .fpill{display:flex;align-items:center;gap:9px;padding:0 12px;flex:1}
  .circle{width:26px;height:26px;border-radius:999px;background:#fff;color:#000;display:grid;place-items:center;font-size:13px;font-weight:700}
  .ftext{font-size:14px;color:var(--t2)}
  .ficon{width:38px;height:38px;border-radius:999px;border:none;background:var(--cardHover);display:grid;place-items:center;cursor:pointer;color:#fff}
  .ficon.danger{background:var(--dangerBg);color:var(--danger)}
  .ficon svg{width:18px;height:18px}
  .dlbtn{height:38px;padding:0 14px;border-radius:999px;border:none;background:var(--accent);color:#fff;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;font-family:var(--font)}
  .dlbtn svg{width:16px;height:16px}
  .note{margin-top:14px;color:rgba(255,255,255,.5);font-size:12px;text-align:center}
</style>
</head>
<body>
<div>
  <div class="root">
    <div class="ambient"></div>
    <div class="content">
      <!-- navbar -->
      <div class="navbar">
        <div class="brand">
          <svg class="logo" viewBox="0 0 22 22" fill="none"><defs><linearGradient id="g" x1="0" y1="0" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#5AC8FA"/><stop offset="100%" stop-color="#0a84ff"/></linearGradient></defs><rect x="3" y="9" width="13" height="10" rx="2.5" fill="url(#g)" opacity=".55"/><rect x="6" y="3" width="13" height="10" rx="2.5" fill="url(#g)"/></svg>
          <span class="largetitle">素材库</span>
          <span class="countBadge">128</span>
        </div>
        <div class="tools">
          <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M21 3l-9 9"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/></svg></div>
          <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
          <div class="tool"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
        </div>
      </div>
      <!-- stats -->
      <div class="statsRow">
        <div class="stat"><div class="stat-v hl">12<span class="u">项</span></div><div class="stat-l">今日采集</div></div>
        <div class="stat"><div class="stat-v">128<span class="u">项</span></div><div class="stat-l">素材总量</div><div class="stat-h">图 96 · 视频 32</div></div>
        <div class="stat"><div class="stat-v">16<span class="u">位</span></div><div class="stat-l">关注作者</div></div>
      </div>
      <!-- filter -->
      <div class="filterRow">
        <button class="chip on">全部</button>
        <button class="chip xhs">小红书</button>
        <button class="chip dy">抖音</button>
        <div class="divider"></div>
        <div class="seg">
          <button class="segb on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></button>
          <button class="segb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6 4 20 12 6 20"/></svg></button>
        </div>
      </div>
      <!-- grid -->
      <div class="scroll">
        <div class="gridSection">
          <div class="gridHead"><span class="gridTitle">今天</span><span class="gridCount">12 张</span></div>
          <div class="gridWrap">
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=200&h=200&fit=crop"><div class="selectBtn on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="multi">9</span><div class="info"><span>@穿搭日记</span></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=200&h=200&fit=crop"><div class="selectBtn"></div><div class="info"><span>@时尚芮</span></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1445205170230-053b83016050?w=200&h=200&fit=crop"><div class="selectBtn on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span class="multi">6</span><div class="info"><span>@美食日常</span></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=200&h=200&fit=crop"><div class="selectBtn"></div><div class="vbadge"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20"/></svg></div><div class="info"><span>@旅行的意义</span></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=200&h=200&fit=crop"><div class="selectBtn on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1469827160215-9d29e96e72f4?w=200&h=200&fit=crop"><div class="selectBtn"></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=200&h=200&fit=crop"><div class="selectBtn"></div><div class="vbadge"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20"/></svg></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1492707892479-7bc8d5a4ee93?w=200&h=200&fit=crop"><div class="selectBtn"></div></div></div>
          </div>
        </div>
        <div class="gridSection">
          <div class="gridHead"><span class="gridTitle">昨天</span><span class="gridCount">24 张</span></div>
          <div class="gridWrap">
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=200&h=200&fit=crop"><div class="selectBtn"></div><span class="multi">4</span></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200&h=200&fit=crop"><div class="selectBtn"></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=200&h=200&fit=crop"><div class="selectBtn"></div></div></div>
            <div class="card"><div class="art"><img src="https://images.unsplash.com/photo-1488161628813-04466f872be2?w=200&h=200&fit=crop"><div class="selectBtn"></div><div class="vbadge"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20"/></svg></div></div></div>
          </div>
        </div>
      </div>
      <!-- floatbar -->
      <div class="bar">
        <div class="fpill"><div class="circle">3</div><span class="ftext">已选 3 项</span></div>
        <button class="ficon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="12" height="16" rx="2"/><polyline points="9 12 11 14 15 10"/></svg></button>
        <button class="dlbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>导出</span></button>
        <button class="ficon danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
      </div>
    </div>
  </div>
  <div class="note">↑ 当前实现预览(对齐原型后)· 鼠标悬停卡片可见作者信息浮现</div>
</div>
</body>
</html>
