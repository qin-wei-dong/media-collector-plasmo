<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400">
<title>设计 B · Apple Photos 风 (Liquid Glass)</title>
<link rel="stylesheet" href="tokens.css">
<style>
  /* ===== 顶栏 ===== */
  .navbar {
    flex-shrink: 0;
    background: rgba(245,245,247,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    padding: var(--sp-lg) var(--sp-lg) var(--sp-sm);
  }
  .nav-row { display: flex; align-items: center; justify-content: space-between; }
  .largetitle {
    font-family: var(--font-display);
    font-size: 34px; font-weight: 600;
    line-height: 1.10; letter-spacing: 0;
  }
  .tools { display: flex; gap: var(--sp-xxs); }
  .tool {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ac-blue);
    transition: background var(--dur-fast) var(--ease-out);
  }
  .tool:hover { background: var(--divider-soft); }
  .tool svg { width: 17px; height: 17px; }
  .tool.active {
    background: var(--ac-blue); color: #fff;
  }

  /* ===== 网格 ===== */
  .grid { flex: 1; overflow-y: auto; padding: 0 0 96px; }

  /* 分段标题(磨砂吸顶) */
  .sec-head {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 600;
    line-height: 1.24; letter-spacing: -0.374px;
    padding: var(--sp-lg) var(--sp-lg) var(--sp-sm);
    position: sticky; top: 0;
    background: rgba(245,245,247,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    z-index: 5;
  }
  .sec-sub {
    font-family: var(--font-text);
    font-size: 14px; color: var(--ink-48); font-weight: 400;
  }

  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-bottom: 2px; padding: 0 var(--sp-xxs); }
  .cell {
    aspect-ratio: 1;
    background-size: cover; background-position: center;
    cursor: pointer; position: relative;
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .cell:active { transform: scale(0.95); }
  .cell.selected::after {
    content: ""; position: absolute; inset: 0;
    border: 4px solid var(--ac-blue);
  }
  .badge-check {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.25); border: 1.5px solid rgba(255,255,255,0.9);
    display: none; align-items: center; justify-content: center;
  }
  .cell.selected .badge-check { display: flex; background: var(--ac-blue); border-color: #fff; }
  .badge-check svg { width: 13px; height: 13px; color: #fff; }

  /* 视频角标(暗角,无图标) */
  .cell.video::before {
    content: ""; position: absolute; bottom: 0; right: 0;
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-bottom: 16px solid rgba(0,0,0,0.45);
  }

  /* ===== 深色浮动操作栏 (Liquid Glass Dark) ===== */
  .actionbar {
    position: absolute; bottom: var(--sp-sm); left: var(--sp-sm); right: var(--sp-sm);
    background: rgba(28,28,30,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 0.5px solid rgba(255,255,255,0.10);
    border-radius: var(--r-lg);
    padding: var(--sp-xs);
    display: flex; align-items: center; gap: var(--sp-xxs);
    z-index: 10;
  }
  .sel-info {
    font-family: var(--font-text);
    font-size: 15px; color: #fff; padding: 0 var(--sp-md); flex: 1;
  }
  .act-icon {
    width: 38px; height: 38px; border-radius: var(--r-sm);
    border: none; background: rgba(255,255,255,0.14);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff;
    transition: transform var(--dur-fast) var(--ease-out);
  }
  .act-icon:active { transform: scale(0.95); }
  .act-icon svg { width: 19px; height: 19px; }
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-row">
    <div class="largetitle">素材</div>
    <div class="tools">
      <div class="tool" title="搜索">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <div class="tool active" title="选择">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
  </div>
</div>

  <div class="sec-head">今天 <span class="sec-sub">· 6 张</span></div>
  <div class="row">

  </div>
  <div class="row">
    <div class="cell video" style="background-image:url(https://picsum.photos/seed/p4/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/p5/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/p6/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  </div>

  <div class="sec-head">昨天 <span class="sec-sub">· 老王摄影 · 9 张</span></div>
  <div class="row">
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q1/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q2/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q3/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  </div>
  <div class="row">
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q4/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q5/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q6/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  </div>
  <div class="row">
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q7/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q8/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="cell" style="background-image:url(https://picsum.photos/seed/q9/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
  </div>

  <div class="sec-head">本周 <span class="sec-sub">· 美食日记 · 12 张</span></div>
  <div class="row">
    <div class="cell video" style="background-image:url(https://picsum.photos/seed/r1/240)"><div class="badge-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>

  </div>

</div>

<div class="actionbar">
  <div class="sel-info">已选 2 项</div>
  <button class="act-icon" title="下载">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <button class="act-icon" title="分享">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>

</div>

</body>
</html>
