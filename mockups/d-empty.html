<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400">
<title>设计 D · 空状态</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    background: #0a0a0c;
    color: #fff;
    width: 380px; height: 600px;
    display: flex; flex-direction: column;
    margin: 0 auto; overflow: hidden; position: relative;
  }
  .ambient {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 15%, rgba(120,80,255,0.15), transparent 60%),
      linear-gradient(180deg, #0a0a0c 0%, #1c1c1e 100%);
  }
  .content { position: relative; z-index: 1; display:flex; flex-direction:column; height:100%; padding: 16px 20px; }
  .navbar { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; }
  .largetitle { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }

  .empty { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .empty-illust {
    width: 88px; height: 88px; border-radius: 22px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border: 0.5px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
  }
  .empty-illust svg { width: 40px; height: 40px; color: rgba(255,255,255,0.7); }
  .empty-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; text-align: center; margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 36px; line-height: 1.5; }

  .steps { display: flex; flex-direction: column; gap: 16px; }
  .step { display: flex; align-items: center; gap: 14px; }
  .step-num {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-num svg { width: 24px; height: 24px; color: #fff; }
  .step-num.s1 { background: linear-gradient(135deg, #FF5A5F, #FF2D55); }
  .step-num.s2 { background: linear-gradient(135deg, #5AC8FA, #007AFF); }
  .step-num.s3 { background: linear-gradient(135deg, #AF52DE, #5856D6); }
  .step-text { flex: 1; }
  .step-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .step-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.4; }
  .step-badge {
    font-size: 12px; font-weight: 700;
    color: rgba(255,255,255,0.35);
    width: 20px; text-align: center;
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="content">

  <div class="navbar">
    <div class="largetitle">素材</div>
  </div>

  <div class="empty">
    <div class="empty-illust">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    </div>
    <div class="empty-title">还没有采集的素材</div>
    <div class="empty-sub">采集小红书、抖音的图片和视频<br>它们会出现在这里</div>

    <div class="steps">
      <div class="step">
        <div class="step-num s1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2h6a2 2 0 0 1 2 2v1h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2V4a2 2 0 0 1 2-2z"/><circle cx="12" cy="13" r="3"/></svg></div>
        <div class="step-text">
          <div class="step-title">打开笔记</div>
          <div class="step-desc">在小红书或抖音点开任意一篇笔记</div>
        </div>
        <div class="step-badge">1</div>
      </div>
      <div class="step">
        <div class="step-num s2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
        <div class="step-text">
          <div class="step-title">点击采集按钮</div>
          <div class="step-desc">在素材左上角找到「采集素材」按钮</div>
        </div>
        <div class="step-badge">2</div>
      </div>
      <div class="step">
        <div class="step-num s3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="step-text">
          <div class="step-title">回到这里查看</div>
          <div class="step-desc">所有采集的素材都会出现在此页面</div>
        </div>
        <div class="step-badge">3</div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
