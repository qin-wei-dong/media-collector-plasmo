<!DOCTYPE html>
<html>
  <head>
    <title>素材采集助手</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 460px;
        height: 660px;
        overflow: hidden;
        border-radius: 20px;
      }
      #__plasmo {
        background: transparent;
        border-radius: 20px;
        overflow: hidden;
        height: 100%;
      }
      /* 自定义滚动条样式(Chrome) */
      *::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      *::-webkit-scrollbar-track {
        background: transparent;
      }
      *::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      *::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      /* Firefox */
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
    </style>
  </head>
  <body>
    <div id="__plasmo"></div>
  </body>
</html>
